name: Monitor Fraudes (12h)

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar agente
        env:
          WC_BASE_URL: ${{ secrets.WC_BASE_URL }}
          WC_CONSUMER_KEY: ${{ secrets.WC_CONSUMER_KEY }}
          WC_CONSUMER_SECRET: ${{ secrets.WC_CONSUMER_SECRET }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          WORKER_INGEST_URL: ${{ secrets.WORKER_INGEST_URL }}
          WORKER_INGEST_TOKEN: ${{ secrets.WORKER_INGEST_TOKEN }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python agent.py

      - name: Salvar arquivos de estado
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"

          git add state/seen.json state/ref_cache.json

          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos arquivos de estado."
            exit 0
          fi

          git commit -m "Update state"

          git pull --rebase origin main
          git push origin HEAD:main
